steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ohlcv-api:$SHORT_SHA', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ohlcv-api:$SHORT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'gcr.io/$PROJECT_ID/ohlcv-api:$SHORT_SHA', 'gcr.io/$PROJECT_ID/ohlcv-api:latest']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ohlcv-api:latest']

images:
  - 'gcr.io/$PROJECT_ID/ohlcv-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/ohlcv-api:latest'
